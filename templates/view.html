<!DOCTYPE html>
<html lang="uz">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; }
        .appearance-card {
            background-color: rgba(10, 25, 47, 1);
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
        .theme-option {
            height: 60px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; transition: 0.3s;
        }
        .theme-dark { background: #0d1117; border-color: #0d6efd; }
        .form-select { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="appearance-card shadow-lg">
        <a href="/settings" class="btn-back mb-4">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
            <span>Orqaga</span>
        </a>
        <h3 class="text-center mb-4">Ko'rinish</h3>
        <form>
            <label class="small text-uppercase opacity-50 mb-2 d-block">Mavzu</label>
            <div class="theme-option theme-dark mb-4">To'q ko'k (Standart)</div>
            <label class="small text-uppercase opacity-50 mb-2 d-block">Til</label>
            <select class="form-select mb-4">
                <option>O'zbekcha</option>
                <option>English</option>
            </select>
            <button class="btn btn-primary w-100 py-2">Saqlash</button>
        </form>
    </div>
</body>
</html>
