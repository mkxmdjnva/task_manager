<!DOCTYPE html>
<html lang="uz">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; }
        .privacy-box {
            background-color: rgba(10, 25, 47, 1);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .form-check-input:checked { background-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="privacy-box shadow-lg">
        <a href="/settings" class="btn-back mb-4">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
            <span>Orqaga</span>
        </a>
        <h3 class="text-center mb-4">Maxfiylik</h3>
        <form>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" checked>
                <label class="form-check-label">Profilni yashirish</label>
            </div>
            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">Onlayn holatni ko'rsatish</label>
            </div>
            <button class="btn btn-primary w-100 py-2">Saqlash</button>
        </form>
    </div>
</body>
</html>
