{% extends 'base.html' %}
{% block content %}

  <style>
    :root{
      --bg:#0f1220; --card:#171a2e; --muted:#9aa0b4; --text:#eef0ff;
      --primary:#6c7cff; --accent:#22c55e; --warn:#f59e0b; --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto; background:linear-gradient(120deg,#0b0e1a,#12163a); color:var(--text)}
    .app{display:grid; grid-template-columns:260px 1fr; min-height:100vh}
    aside{background:rgba(23,26,46,.9); backdrop-filter: blur(8px); padding:20px}
    .brand{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.5px}
    .brand .dot{width:10px;height:10px;border-radius:50%; background:var(--primary)}
    nav{margin-top:24px; display:grid; gap:8px}
    nav a{padding:12px 14px; border-radius:12px; color:var(--text); text-decoration:none; display:flex; justify-content:space-between}
    nav a.active, nav a:hover{background:#1f2350}
    main{padding:24px}
    header{display:flex; gap:16px; align-items:center; justify-content:space-between}
    .search{flex:1; max-width:520px}
    .search input{width:100%; padding:12px 14px; border-radius:12px; border:1px solid #2a2f6b; background:#0f1230; color:var(--text)}
    .btn{padding:12px 14px; border-radius:12px; border:none; cursor:pointer; color:#0b0e1a; background:var(--primary); font-weight:700}
    .grid{margin-top:20px; display:grid; grid-template-columns:repeat(12,1fr); gap:16px}
    .card{background:rgba(23,26,46,.95); border:1px solid #242a6a; border-radius:18px; padding:18px}
    .kpi{grid-column: span 3}
    .kpi h3{margin:0; color:var(--muted); font-size:14px}
    .kpi p{margin:8px 0 0; font-size:28px; font-weight:800}
    .list{grid-column: span 8}
    .side{grid-column: span 4}
    table{width:100%; border-collapse:separate; border-spacing:0 10px}
    th{color:var(--muted); font-weight:600; text-align:left; font-size:12px}
    td{padding:12px; background:#0f1230}
    tr td:first-child{border-radius:12px 0 0 12px}
    tr td:last-child{border-radius:0 12px 12px 0}
    .tag{padding:4px 8px; border-radius:999px; font-size:12px; font-weight:700}
    .low{background:#143b2a;color:#22c55e}
    .mid{background:#3b2a14;color:#f59e0b}
    .high{background:#3b1414;color:#ef4444}
    .progress{height:8px; background:#1f2350; border-radius:999px; overflow:hidden}
    .bar{height:100%; background:linear-gradient(90deg,var(--primary),#9aa3ff)}
    @media (max-width:900px){.app{grid-template-columns:1fr} aside{display:none} .kpi{grid-column: span 6} .list{grid-column: span 12} .side{grid-column: span 12}}
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand"><span class="dot"></span>Task Manager</div>
      <nav>
        <a class="active" href="#">Bosh sahifa</a>
        <a href="/vazifalar">Vazifalar</a>
        <a href="/kalendar">Kalendar</a>
        <a href="/statistics">Statistika</a>
        <a href="/settings">Sozlamalar</a>
      </nav>
    </aside><main>
  <header>
    <div class="search"><input type="search" name="search" placeholder="Vazifa qidirish…"/></div>
    <button class="btn"><a href="/yangi_vazifa">+ Yangi vazifa</a></button>
  </header>

  <section class="grid">
    <div class="card kpi"><h3 style="color: white;">Bugungi vazifalar</h3><p style="color: #eef0ff; font-weight: bold;">8</p></div>
    <div class="card kpi"><h3 style="color: white;">Bajarilgan</h3><p style="color: #eef0ff; font-weight: bold;">21</p></div>
    <div class="card kpi"><h3 style="color: white;">Jarayonda</h3><p style="color: #eef0ff; font-weight: bold;">5</p></div>
    <div class="card kpi"><h3 style="color: white;">Muddati o‘tgan</h3><p style="color: #eef0ff; font-weight: bold;">1</p></div>

    <div class="card list">
      <h3 style="color: white;">So‘nggi vazifalar</h3>
      <table>
        <thead><tr><th style="color: #cccccc;">Vazifa</th><th style="color: #cccccc;">Muddat</th><th style="color: #cccccc;">Ustuvorlik</th><th style="color: #eeeeee;">Progress</th></tr></thead>
        <tbody>
          <tr>
            <td style="color: white;">UI dizaynni tugatish</td><td style="color: #eeeeee;">29-yan</td><td><span class="tag high">High</span></td>

{% endblock %}
